openapi: 3.0.3
info:
  title: GTFS Mobile API
  version: 1.0.0
  description: |
    Thin Go layer over Supabase GTFS static + realtime data.
    All responses follow the envelope `{ status, data, meta? }`.
    `status.mode` becomes `static_only` if the GTFS realtime feed has not synced recently.
servers:
  - url: http://localhost:8080
  - url: https://localhost:8443
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Stops
  - name: Routes
  - name: Trips
  - name: Calendar
  - name: Feed
  - name: Realtime
  - name: Map

paths:
  /v1/feed/active:
    get:
      tags: [Feed]
      summary: Feed coverage — static calendar date window + last successful sync
      description: |
        `calendar_window.min_date` / `max_date` span `calendar` and `calendar_dates` in the database (ISO dates).
        Use to show “outside feed window” in the app. `status` in the envelope carries `mode` (normal / static_only).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeedActiveResponse" }
        "500":
          description: Server error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /healthz:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: OK

  /v1/auth/signup:
    post:
      tags: [Auth]
      summary: Sign up a user with Supabase Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Signup response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/login:
    post:
      tags: [Auth]
      summary: Login a user with Supabase Auth password grant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Login response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid credentials or request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify email OTP for signup or email flows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOTPRequest"
      responses:
        "200":
          description: Verification response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid token/type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/users/me/favorite-routes:
    get:
      tags: [Users]
      summary: List my favorite routes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FavoriteRoutesResponse" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    post:
      tags: [Users]
      summary: Add a favorite route
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FavoriteRouteRequest" }
      responses:
        "200":
          description: OK
        "400":
          description: Invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/users/me/favorite-routes/{routeId}:
    delete:
      tags: [Users]
      summary: Remove a favorite route
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: routeId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/gtfs/stops:
    get:
      tags: [Stops]
      summary: Search stops by text and/or geo
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: lat
          schema: { type: number, format: double }
        - in: query
          name: lon
          schema: { type: number, format: double }
        - in: query
          name: radius
          description: Radius in meters
          schema: { type: integer, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StopSummaryListResponse" }

  /v1/gtfs/stops/{stopId}:
    get:
      tags: [Stops]
      summary: Get stop details
      parameters:
        - in: path
          name: stopId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StopResponse" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /v1/gtfs/stops/{stopId}/departures:
    get:
      tags: [Stops]
      summary: Departures at a stop
      parameters:
        - in: path
          name: stopId
          required: true
          schema: { type: string }
        - in: query
          name: at
          description: ISO 8601 timestamp (defaults to now)
          schema: { type: string, format: date-time }
        - in: query
          name: windowMinutes
          schema: { type: integer, minimum: 1, maximum: 360 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeparturesResponse" }

  /v1/gtfs/routes:
    get:
      tags: [Routes]
      summary: Search routes
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500 }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RoutesResponse" }

  /v1/gtfs/routes/{routeId}:
    get:
      tags: [Routes]
      summary: Get route details
      parameters:
        - in: path
          name: routeId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouteResponse" }
        "404":
          description: Not found

  /v1/gtfs/routes/{routeId}/stops:
    get:
      tags: [Routes]
      summary: Stops served by a route
      parameters:
        - in: path
          name: routeId
          required: true
          schema: { type: string }
        - in: query
          name: directionId
          schema: { type: string, enum: ["0", "1"] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StopSummaryListResponse" }

  /v1/gtfs/routes/{routeId}/directions:
    get:
      tags: [Routes]
      summary: Directions available for a route
      parameters:
        - in: path
          name: routeId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouteDirectionsResponse" }

  /v1/gtfs/routes/{routeId}/shape:
    get:
      tags: [Routes]
      summary: Polyline points for most common route shape
      description: |
        Only one `shape_id` is loaded per request (not the whole 400k-row shapes table).
        By default vertices are capped (~2000) for small JSON and smooth map rendering.
        Use `maxPoints=0` for full GTFS resolution (large responses).
      parameters:
        - in: path
          name: routeId
          required: true
          schema: { type: string }
        - in: query
          name: directionId
          schema: { type: string, enum: ["0", "1"] }
        - in: query
          name: maxPoints
          description: |
            Max vertices returned (50–25000). Defaults to 2000. Use 0 for no cap (all points for this shape).
          schema: { type: integer, minimum: 0, maximum: 25000 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RouteShapeResponse" }
        "404":
          description: Not found

  /v1/gtfs/trips:
    get:
      tags: [Trips]
      summary: List trips by route and service date
      parameters:
        - in: query
          name: routeId
          schema: { type: string }
        - in: query
          name: serviceDate
          description: YYYY-MM-DD (defaults to today)
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TripsResponse" }

  /v1/gtfs/trips/{tripId}:
    get:
      tags: [Trips]
      summary: Get trip details
      parameters:
        - in: path
          name: tripId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TripResponse" }
        "404":
          description: Not found

  /v1/gtfs/trips/{tripId}/stop-times:
    get:
      tags: [Trips]
      summary: Stop times for a trip
      parameters:
        - in: path
          name: tripId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TripStopTimesResponse" }

  /v1/gtfs/calendar/day:
    get:
      tags: [Calendar]
      summary: Services running on a date (GTFS calendar + calendar_dates rules)
      description: |
        Base set: `calendar` rows where date is in [start_date, end_date] and weekday flag matches.
        Remove services with `calendar_dates.exception_type = 2` on that date.
        Add services with `exception_type = 1` on that date (calendar-only feed pattern supported).
        Optional `detail=true`: weekday pattern, route short names, trip counts. `include=window`: embed feed min/max dates.
      parameters:
        - in: query
          name: date
          description: YYYY-MM-DD (defaults to today, agency context is client-side)
          schema: { type: string, format: date }
        - in: query
          name: detail
          description: If true, include calendar row, display label, routes, trip counts per service
          schema: { type: boolean, default: false }
        - in: query
          name: include
          description: Comma-separated; use `window` to include `feed_calendar_window` on the payload
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CalendarDayResponse" }
        "400":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /v1/gtfs/calendar:
    get:
      tags: [Calendar]
      summary: List GTFS calendar service definitions (weekly patterns)
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CalendarListResponse" }

  /v1/gtfs/calendar/{serviceId}:
    get:
      tags: [Calendar]
      summary: Get one calendar service by service_id
      parameters:
        - in: path
          name: serviceId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CalendarServiceResponse" }
        "404":
          description: Not found

  /v1/gtfs/calendar/service:
    get:
      tags: [Calendar]
      summary: Active services on a date
      parameters:
        - in: query
          name: date
          description: YYYY-MM-DD (defaults to today)
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServiceCalendarResponse" }

  /v1/gtfs/calendar/exceptions:
    get:
      tags: [Calendar]
      summary: Calendar exceptions in a date range
      description: Rows from `calendar_dates`. `exception_type` 1 = service added on that date, 2 = removed. Dates are YYYY-MM-DD in JSON.
      parameters:
        - in: query
          name: from
          required: true
          schema: { type: string, format: date }
        - in: query
          name: to
          required: true
          schema: { type: string, format: date }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CalendarExceptionsResponse" }

  /v1/map/routes-overlay:
    get:
      tags: [Map]
      summary: Routes with polylines and stops per direction (map explorer)
      description: |
        Returns each requested route with `route_color` / `route_text_color` and `legs[]`.
        Each leg is one GTFS direction: `points` (shape polyline) and `stops` (sequence along that pattern).
        Polylines follow GTFS shapes (not road-snapped). For road-hugging lines, optionally snap client-side (e.g. Directions API).
      parameters:
        - in: query
          name: routeIds
          required: true
          description: Comma-separated `route_id` values (max 25)
          schema: { type: string, example: "M6,M61,M62" }
        - in: query
          name: directionId
          description: If set (`0` or `1`), only that direction is included per route
          schema: { type: string, enum: ["0", "1"] }
        - in: query
          name: maxPoints
          description: Vertex cap per shape (default 1800). Use 0 for full GTFS resolution (large JSON).
          schema: { type: integer, minimum: 0, maximum: 25000 }
        - in: query
          name: routeIdsKind
          description: |
            Omit or `route_id` — each token is a GTFS `route_id`.
            `short_name` — tokens are `route_short_name` (e.g. `4`, `M6`); backend resolves to `route_id`.
          schema: { type: string, enum: [route_id, short_name, short] }
      responses:
        "200":
          description: |
            OK. `meta.missing_route_ids` lists tokens or route_ids with no drawable geometry.
            `meta.requested_routes` is how many distinct routes were requested after resolution.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MapRoutesOverlayResponse" }
        "400":
          description: Missing or invalid routeIds

  /v1/map/static:
    get:
      tags: [Map]
      summary: Map bundle — nearby stops + route colors in one request
      description: |
        Prefer this for the live map instead of calling `/v1/gtfs/stops` and `/v1/gtfs/routes` separately.
        Filter stops by `lat`, `lon`, and `radius`. If `routeIds` is set, only stops served by those routes
        (via `stop_times` / `trips`) are returned, and `routes` lists only those lines — for “selected routes” map mode.
        Route-filtered stops use the database (not only the snapshot).
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number, format: double }
        - in: query
          name: lon
          required: true
          schema: { type: number, format: double }
        - in: query
          name: radius
          description: Search radius in meters (default from server config, max 50000)
          schema: { type: integer, minimum: 1, maximum: 50000 }
        - in: query
          name: stopLimit
          description: Max stops returned (nearest first), default 150, max 500
          schema: { type: integer, minimum: 1, maximum: 500 }
        - in: query
          name: routeLimit
          description: Max routes returned for badge colors, default 300, max 500
          schema: { type: integer, minimum: 1, maximum: 500 }
        - in: query
          name: routeSearch
          description: Optional filter on route short/long name (substring); applies to the route list
          schema: { type: string }
        - in: query
          name: routeIds
          description: |
            Optional comma-separated `route_id` values (max 25). When set, limits stops and route list to these routes.
          schema: { type: string, example: "R1,R2" }
        - in: query
          name: routeIdsKind
          description: Use short_name when routeIds contains route numbers/names.
          schema: { type: string, enum: [route_id, short_name, short] }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MapStaticResponse" }
        "400":
          description: Missing or invalid lat/lon/radius

  /v1/map/vehicles:
    get:
      tags: [Realtime]
      summary: Active vehicle positions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VehiclesResponse" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    APIStatus:
      type: object
      required: [mode]
      properties:
        mode: { type: string, enum: [normal, static_only] }
        last_successful_sync: { type: string, format: date-time, nullable: true }

    Meta:
      type: object
      properties:
        total: { type: integer }
        limit: { type: integer }
        page: { type: integer }
        has_next: { type: boolean }
        service_date: { type: string }
        requested_routes: { type: integer }
        missing_route_ids:
          type: array
          items: { type: string }

    StopSummary:
      type: object
      required: [stop_id, lat, lon]
      properties:
        stop_id: { type: string }
        id: { type: string, description: duplicate of stop_id for map clients }
        gtfs_stop_id: { type: string, description: duplicate of stop_id for alt parsers }
        stop_name: { type: string }
        stop_code: { type: string }
        lat: { type: number, format: double }
        lon: { type: number, format: double }

    Stop:
      type: object
      required: [stop_id]
      properties:
        stop_id: { type: string }
        stop_code: { type: string }
        stop_name: { type: string }
        stop_desc: { type: string }
        lat: { type: number }
        lon: { type: number }
        zone_id: { type: string }
        location_type: { type: string }
        parent_station: { type: string }
        wheelchair_boarding: { type: string }
        platform_code: { type: string }

    Route:
      type: object
      required: [route_id]
      properties:
        route_id: { type: string }
        agency_id: { type: string }
        short_name: { type: string }
        long_name: { type: string }
        route_type: { type: string }
        route_color: { type: string }
        route_text_color: { type: string }

    RouteShapePoint:
      type: object
      required: [sequence, lat, lon]
      properties:
        sequence: { type: integer }
        lat: { type: number, format: double }
        lon: { type: number, format: double }

    RouteShape:
      type: object
      required: [route_id, shape_id, points]
      properties:
        route_id: { type: string }
        shape_id: { type: string }
        total_points:
          type: integer
          description: Full vertex count for this shape_id in the database (before maxPoints sampling).
        points:
          type: array
          items: { $ref: "#/components/schemas/RouteShapePoint" }

    RouteDirection:
      type: object
      required: [direction_id, trip_count]
      properties:
        direction_id: { type: string, enum: ["", "0", "1"] }
        headsign: { type: string }
        trip_count: { type: integer }

    Trip:
      type: object
      required: [trip_id]
      properties:
        trip_id: { type: string }
        route_id: { type: string }
        service_id: { type: string }
        headsign: { type: string }
        short_name: { type: string }
        direction_id: { type: string }
        block_id: { type: string }
        shape_id: { type: string }
        wheelchair_accessible: { type: string }
        bikes_allowed: { type: string }

    TripStopTime:
      type: object
      required: [stop_id, stop_sequence]
      properties:
        stop_id: { type: string }
        stop_name: { type: string }
        stop_sequence: { type: integer }
        arrival_time: { type: string }
        departure_time: { type: string }
        stop_headsign: { type: string }
        pickup_type: { type: string }
        drop_off_type: { type: string }

    Departure:
      type: object
      required: [trip_id, scheduled_time, estimated_time, is_realtime]
      properties:
        trip_id: { type: string }
        route_id: { type: string }
        route_short_name: { type: string }
        headsign: { type: string }
        scheduled_time: { type: string, format: date-time }
        estimated_time: { type: string, format: date-time }
        is_realtime: { type: boolean }

    Vehicle:
      type: object
      required: [vehicle_id, lat, lon]
      properties:
        vehicle_id: { type: string }
        trip_id: { type: string }
        route_id: { type: string }
        lat: { type: number }
        lon: { type: number }
        bearing: { type: number }
        speed: { type: number }

    ServiceCalendarDay:
      type: object
      properties:
        service_id: { type: string }
        source: { type: string, enum: [calendar, exception_added] }

    CalendarException:
      type: object
      properties:
        service_id: { type: string }
        date: { type: string, format: date }
        exception_type:
          type: string
          description: GTFS — 1 service added on date, 2 service removed on date
          enum: ["1", "2"]

    ServiceDisplay:
      type: object
      properties:
        label: { type: string }
        description: { type: string }
        route_short_names:
          type: array
          items: { type: string }
        trip_count: { type: integer }
        has_trips: { type: boolean }

    ActiveServiceOnDay:
      type: object
      required: [service_id, source]
      properties:
        service_id: { type: string }
        source:
          type: string
          enum: [calendar, exception_added]
        calendar: { $ref: "#/components/schemas/CalendarService" }
        exceptions_today:
          type: array
          items: { $ref: "#/components/schemas/CalendarException" }
        display: { $ref: "#/components/schemas/ServiceDisplay" }

    CalendarDayPayload:
      type: object
      required: [date, services]
      properties:
        date: { type: string, format: date }
        services:
          type: array
          items: { $ref: "#/components/schemas/ActiveServiceOnDay" }
        calendar_date_events:
          type: array
          items: { $ref: "#/components/schemas/CalendarException" }
        feed_calendar_window:
          type: object
          properties:
            min_date: { type: string, format: date }
            max_date: { type: string, format: date }

    CalendarDayResponse:
      type: object
      properties:
        status: { $ref: "#/components/schemas/APIStatus" }
        data: { $ref: "#/components/schemas/CalendarDayPayload" }
        meta: { $ref: "#/components/schemas/Meta" }

    FeedCalendarWindow:
      type: object
      properties:
        min_date: { type: string, format: date }
        max_date: { type: string, format: date }

    FeedActivePayload:
      type: object
      properties:
        calendar_window: { $ref: "#/components/schemas/FeedCalendarWindow" }
        last_successful_sync: { type: string, format: date-time, nullable: true }

    FeedActiveResponse:
      type: object
      properties:
        status: { $ref: "#/components/schemas/APIStatus" }
        data: { $ref: "#/components/schemas/FeedActivePayload" }

    APIError:
      type: object
      required: [code, message, request_id]
      properties:
        code: { type: string }
        message: { type: string }
        request_id: { type: string }

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: { $ref: "#/components/schemas/APIError" }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }

